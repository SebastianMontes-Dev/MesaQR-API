# ===== Base de datos PostgreSQL =====
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/restaurant_db
spring.datasource.username=restaurant
spring.datasource.password=${DB_PASSWORD:restaurant}

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== Flyway (migraciones) =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===== Servidor =====
server.port=8080

# ===== WebSocket =====
spring.websocket.max-text-message-size=8192

# ===== Restaurante =====
restaurant.name=Mi Restaurante

# ===== Registro de eventos =====
logging.level.com.restaurant=DEBUG

# ===== Seguridad CORS =====
restaurant.cors.allowed-origins=http://localhost:8080,http://localhost:3000

# ===== Rate Limiting =====
resilience4j.ratelimiter.instances.pago.limit-for-period=5
resilience4j.ratelimiter.instances.pago.limit-refresh-period=1s
resilience4j.ratelimiter.instances.pago.timeout-duration=0s

resilience4j.ratelimiter.instances.pedido.limit-for-period=10
resilience4j.ratelimiter.instances.pedido.limit-refresh-period=1s
resilience4j.ratelimiter.instances.pedido.timeout-duration=0s
